name: Deploy to EKS 
on:
  push:
    branches: [ main ] 
permissions:
  id-token: write
  contents: read
env:
  ECR_REPOSITORY: 
  EKS_CLUSTER_NAME:  clickshield-eks-cluster
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
  AWS_ACTIONS_ROLE:  ${{ secrets.ACTIONS_IAM_ROLE }}

jobs:
  deploy_to_ecr_and_eks:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Set short git commit SHA
        id: commit
        uses: prompt/actions-commit-hash@v4
  
      - name: Check out code
        uses: actions/checkout@v6 
  
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ secrets.ACTIONS_IAM_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push docker image to Amazon ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: clickshield-platform-repo
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f Dockerfile.backend -t $REGISTRY/$REPOSITORY-backend:$IMAGE_TAG .
          docker build -f Dockerfile.frontend -t $REGISTRY/$REPOSITORY-frontend:$IMAGE_TAG .
          # docker push $REGISTRY/$REPOSITORY-frontend:$IMAGE_TAG

      - name: Trivy scan (fail on CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: '${{ steps.login-ecr.outputs.registry }}/clickshield-platform-repo:${{ github.sha }}'
          format: 'table'
          severity: 'CRITICAL'
          ignore-unfixed: true   # optional: skip vulns with no fix available
          exit-code: '1'         # <-- this is what stops the build
        
      - name: Push docker image to Amazon ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: clickshield-platform-repo
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $REGISTRY/$REPOSITORY-backend:$IMAGE_TAG 
          docker push $REGISTRY/$REPOSITORY-frontend:$IMAGE_TAG

      - name: Update kube config 
        run: |
          aws eks update-kubeconfig --name $EKS_CLUSTER_NAME --region $AWS_REGION
  
