name: Deploy to ECR
on:
  push:
    branches: [ main ] 
permissions:
  id-token: write
  contents: read
env:
  ECR_REPOSITORY: 
  EKS_CLUSTER_NAME:  ${{ secrets.AWS_EKS_CLUSTER_NAME }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
  AWS_ACTIONS_ROLE:  ${{ secrets.ACTIONS_IAM_ROLE }}

jobs:
  deploy_to_ecr_and_eks:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Set short git commit SHA
        id: commit
        uses: prompt/actions-commit-hash@v2
  
      - name: Check out code
        uses: actions/checkout@v2 
  
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ secrets.ACTIONS_IAM_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Login to Amazon ECR Public
        id: login-ecr-public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Build, tag, and push docker image to Amazon ECR Public
        env:
          REPOSITORY_URI: # Replaced with your actual URI
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REPOSITORY_URI:$IMAGE_TAG .
          docker push $REPOSITORY_URI:$IMAGE_TAG

      - name: Update kube config 
        run: |
          aws eks update-kubeconfig --name $EKS_CLUSTER_NAME --region $AWS_REGION
  
      - name: Deploy to EKS 
        env:
          ECR_REGISTRY:  ${{ steps.login-ecr.outputs.registry }} 
          IMAGE_TAG: ${{ steps.commit.outputs.short }}
        run: | 
          sed -i.bak "s|DOCKER_IMAGE|$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG|g" manifests/app-deploy.yaml && \
          kubectl apply -f manifests/app-deploy.yaml 
          kubectl apply -f manifests/app-service.yaml 
