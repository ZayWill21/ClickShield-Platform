apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: clickshield-backend-hpa
  namespace: default
  labels:
    app: clickshield-backend
    app.kubernetes.io/part-of: clickshield
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: clickshield-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Max
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: clickshield-frontend-hpa
  namespace: default
  labels:
    app: clickshield-frontend
    app.kubernetes.io/part-of: clickshield
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: clickshield-frontend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Max