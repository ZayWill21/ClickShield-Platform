apiVersion: apps/v1
kind: Deployment
metadata:
  name: clickshield-frontend
  labels:
    app: clickshield-frontend
spec:
  replicas: 2
  selector: 
    matchLabels:
      app: clickshield-frontend
  template:
    metadata:
      labels:
        app: clickshield-frontend
    spec:
      containers:
        - name: clickshield-frontend
          image: 
          ports:
            - containerPort: 80 #Nginx listens on 80