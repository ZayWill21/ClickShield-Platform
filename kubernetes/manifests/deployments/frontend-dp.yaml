apiVersion: apps/v1
kind: Deployment
metadata:
  name: clickshield-frontend
  labels:
    app: clickshield-frontend
spec:
  replicas: 2
  selector: 
    matchLabels:
      app: clickshield-frontend
  template:
    metadata:
      labels:
        app: clickshield-frontend
    spec:
      containers:
        - name: clickshield-frontend
          image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/clickshield-platform-repo:frontend-c1ba7b34943cbdc663de3f45326c4ddaa616f822
          ports:
            - containerPort: 80 #Nginx listens on 80
          resource:
            limits:
              cpu: "500m"
              memory: "256Mi"
            requests:
              cpu: "250m"
              memory: "128Mi"