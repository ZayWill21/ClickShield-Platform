apiVersion: apps/v1
kind: Deployment
metadata:
  name: clickshield-backend
  labels: 
    app: clickshield-backend
  spec: 
    replicas: 2
    selector:
      matchLabels:
        app: clickshield-backend
      template:
        metadata:
          labels:
            app: clickshield-backend
        spec:
          containers:
            - name: clickshield-backend
              image: BACKEND_IMAGE
              ports:
                - containerPort: 8001
              env:
                - name: PORT
                  value: "8001"
                - name: GOOGLE_SAFE_BROWSING_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: clickshield-secrets
                      key: GOOGLE_SAFE_BROWSING_API_KEY
              resources:
                limits:
                  cpu: "500m"
                  memory: "256Mi"
                requests:
                  cpu: "250m"
                  memory: "128Mi"